<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="./scripts/htmx.min.js"></script>
    <script src="./scripts/alpine.min.js"></script>
    <script src="./scripts/app.js"></script>
    <title>Rest Countries API</title>
  </head>
  <body
    :class="darkMode ? 'theme--dark' : 'theme--light'"
    x-data="countriesApp()"
    x-init="init()"
  >
    <header class="header">
      <div class="header__container">
        <h1 class="header__title" @click="backToList()" tabindex="0">
          Where in the world?
        </h1>
        <button
          class="header__toggle"
          @click="toggleDarkMode()"
          aria-label="Toggle Dark Mode"
        >
          <img
            :src="darkMode ? './assets/images/dark-mode-moon-icon.svg' : './assets/images/light-mode-moon-icon.svg'"
            alt=""
          />
          <span x-text="darkMode ? 'Light Mode' : 'Dark Mode'"></span>
        </button>
      </div>
    </header>

    <main class="main">
      <div class="main__controls">
        <div
          class="search-container"
          x-data="countrySearch()"
          @click.outside="close()"
        >
          <input
            type="text"
            x-model="query"
            @input.debounce.500ms="searchCountries()"
            placeholder="Search for a country..."
            class="w-full px-4 py-2 border rounded"
          />

          <!-- Loading indicator -->
          <span x-show="loading" class="loading">Loading...</span>

          <!-- Dropdown -->
          <ul x-show="open && results.length > 0" class="dropdown">
            <template x-for="country in results" :key="country.cca3">
              <li @click="selectCountry(country)">
                <span x-text="country.name.common"></span>
              </li>
            </template>
          </ul>

          <!-- No results -->
          <div
            x-show="open && !loading && noResults"
            class="dropdown no-result"
          >
            No results found.
          </div>
        </div>

          <img

        <!-- Dropdown List -->
        <select>
          <template x-for="region in regions">
            <option :value="region" x-text="region"></option>
          </template>
        </select>
      </div>

      <div>
        <section
          class="countries"
          hx-get="/countries?page=1"
          hx-trigger="revealed"
          hx-swap="beforeend"
          id="countries-container"
        ></section>
        <div class="btn-container" id="button-container"></div>
        <!-- Countries & Load More go here -->
      </div>
